  <text
     style="font-size:40px;line-height:.6em;font-family:Tahoma;-inkscape-font-specification:Tahoma;letter-spacing:0;word-spacing:0;fill:#000;fill-opacity:1;stroke:none"
     x="452.48"
     y="7.627"
     transform="translate(-434.773 57.013)"
     id="text136"><tspan
       x="452.48"
       y="7.627"
       style="font-weight:700;font-size:21.3px;line-height:.6em"
       id="tspan132">Offsetting polygons and </tspan><tspan
       x="452.48"
       y="31.627"
       style="font-weight:700;font-size:21.3px;line-height:.6em"
       id="tspan134">when to square mitered joins</tspan></text>
  <path
     style="color:#000;display:inline;overflow:visible;fill:#0f0;fill-opacity:.331754;stroke:#000;stroke-width:2.01325;stroke-linecap:butt;stroke-linejoin:miter;stroke-miterlimit:4;stroke-opacity:.454976;"
     d="m616.26 229.352 13.045 21.888-8.407-1.12 1.338 53.895 8.317 1.266-12.246 18.465-13.026-22.097 8.361 1.193-1.106-53.916-8.406-1.12zm-2.602-96.447 13.045 21.888-8.407-1.12 1.338 53.895 8.317 1.267-12.246 18.464-13.026-22.097 8.362 1.194-1.106-53.916-8.407-1.12z"
     transform="translate(-434.773 57.013)"
     id="path138" />
  <text
     xml:space="preserve"
     style="font-size:14px;line-height:1.25;font-family:Tahoma;-inkscape-font-specification:'Tahoma, Normal'"
     x="358.47058"
     y="27.01627"
     id="text1376"><tspan
       sodipodi:role="line"
       id="tspan1374"
       x="358.47058"
       y="27.01627">When offsetting polygons using mitered joins, there's a risk that </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="44.51627"
       id="tspan1378">mitered offset points will be a very long way away from their starting    </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="62.01627"
       id="tspan1380">points (the miter distance). This will happen whenever the internal  </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="79.516266"
       id="tspan1382">angle at a given point (vertex) is very small. To manage this, </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="97.016266"
       id="tspan1384">whenever the miter distance at a given vertex exceeds a specified  </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="114.51627"
       id="tspan1386">limit, the join is 'squared' instead of mitered. So, given a specific  </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="132.01627"
       id="tspan1388">offset limit (relative to the offset value), calculate the largest </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="149.51627"
       id="tspan1390">angle <tspan
   style="font-weight:bold"
   id="tspan1462">ß</tspan> (or smallest <tspan
   style="font-weight:bold"
   id="tspan1448">Ø</tspan>) that is safe to miter.</tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="167.01627"
       id="tspan1392" /><tspan
       sodipodi:role="line"
       x="358.47058"
       y="184.51627"
       id="tspan1394">Given <tspan
   style="font-weight:bold"
   id="tspan1450">δ</tspan> is the offset distance and  <tspan
   style="font-weight:bold"
   id="tspan1460">λ</tspan> × <tspan
   style="font-weight:bold"
   id="tspan1454">δ</tspan> is the maximum </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="202.01627"
       id="tspan1396">allowed miter distance ..      </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="219.51627"
       id="tspan1398">Calculate the largest possible <tspan
   style="font-weight:bold"
   id="tspan1456">ß</tspan> (relative to <tspan
   style="font-weight:bold"
   id="tspan1458">δ</tspan> and <tspan
   style="font-weight:bold"
   id="tspan911">λ</tspan>).     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="237.01627"
       id="tspan1400" /><tspan
       sodipodi:role="line"
       x="358.47058"
       y="254.51627"
       id="tspan1402">length(ac) = δ      </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="272.01627"
       id="tspan1404">length(ab) = λ × δ (eg λ = 2 as in the example below)     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="289.51627"
       id="tspan1406">Ø = PI - ß     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="307.01627"
       id="tspan1408">∠a = ∠b = Ø, ∠abc = Ø / 2     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="324.90216"
       id="tspan1410">sin(Ø / 2) = δ / (λ × δ) = 1 / λ     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="342.40216"
       id="tspan1412">sin(Ø / 2) = √((1 – cos(Ø)) / 2) **     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="359.90216"
       id="tspan1414">1 / λ = √((1 – cos(Ø)) / 2)     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="377.40216"
       id="tspan1416">λ = √(2 / (1 – cos(Ø)))     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="394.90216"
       id="tspan1418">λ² = 2 / (1 – cos(Ø))     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="412.40216"
       id="tspan1420">1 – cos(Ø) = 2 / λ²     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="429.90216"
       id="tspan1424">1 – cos(PI – ß) = 2 / λ²      </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="447.40216"
       id="tspan1426">given ... cos(PI – ß) = –cos(ß) **     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="464.90216"
       id="tspan1428">1 + cos(ß) = 2 / λ²     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="482.40216"
       id="tspan1430">cos(ß) = (2 / λ²) – 1     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="499.90216"
       id="tspan1432"><tspan
   style="font-weight:bold"
   id="tspan1498">ß = cos⁻¹((2 / λ²) – 1) </tspan>    </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="517.40216"
       id="tspan1434" /><tspan
       sodipodi:role="line"
       x="358.47058"
       y="534.90216"
       id="tspan1436"><tspan
   style="font-weight:bold"
   id="tspan1492">Example:</tspan> If the relative miter distance (λ) is 2, then     </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="552.40216"
       style="font-size:12px"
       id="tspan1500"><tspan
   id="tspan1506"
   style="font-size:14px">ß = cos⁻¹((2 / 2²) – 1) = 2.094 radians (ie 120 degrees).     </tspan> </tspan><tspan
       sodipodi:role="line"
       x="358.47058"
       y="569.90216"
       id="tspan1442" /><tspan
       sodipodi:role="line"
       x="358.47058"
       y="587.40216"
       id="tspan1444" /></text>
